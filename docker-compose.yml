##############################################################################
# Lahraoui-NeuralForex-Pro - Docker Compose Orchestration
#
# Start everything:
#   docker compose up --build
#
# The defaults are safe for local academic demos:
# - market data is synthetic unless MARKET_DATA_MODE=twelvedata is set
# - sentiment is neutral demo mode unless SENTIMENT_MODE=live is set
# - order execution is simulation-only
##############################################################################

networks:
  forex-net:
    driver: bridge

volumes:
  postgres_data:
  model_weights:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-neuralforex}
      POSTGRES_USER: ${POSTGRES_USER:-neuralforex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neuralforex_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - forex-net
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neuralforex} -d ${POSTGRES_DB:-neuralforex}"]
      interval: 10s
      timeout: 5s
      retries: 5

  brain-python:
    build:
      context: ./brain-python
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BRAIN_PORT: "8000"
      MODEL_WEIGHTS_PATH: /app/weights/model.weights.h5
      DB_URL: postgresql://${POSTGRES_USER:-neuralforex}:${POSTGRES_PASSWORD:-neuralforex_secret}@postgres:5432/${POSTGRES_DB:-neuralforex}
      MARKET_DATA_MODE: ${MARKET_DATA_MODE:-demo}
      TWELVE_DATA_API_KEY: ${TWELVE_DATA_API_KEY:-}
      TWELVE_DATA_SYMBOL: ${TWELVE_DATA_SYMBOL:-EUR/USD}
      SYMBOL: ${SYMBOL:-EURUSD}
      SENTIMENT_MODE: ${SENTIMENT_MODE:-demo}
    volumes:
      - model_weights:/app/weights
    networks:
      - forex-net
    ports:
      - "${BRAIN_HOST_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  executor-java:
    build:
      context: ./executor-java
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BRAIN_SERVICE_URL: http://brain-python:8000
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-neuralforex}
      DB_USER: ${POSTGRES_USER:-neuralforex}
      DB_PASS: ${POSTGRES_PASSWORD:-neuralforex_secret}
      ACCOUNT_BALANCE: ${ACCOUNT_BALANCE:-10000}
      RISK_PERCENT: ${RISK_PERCENT:-1.0}
      STOP_LOSS_PIPS: ${STOP_LOSS_PIPS:-20}
      REWARD_RATIO: ${REWARD_RATIO:-2.0}
      MIN_CONFIDENCE: ${MIN_CONFIDENCE:-0.60}
      EXECUTION_MODE: ${EXECUTION_MODE:-SIMULATION}
    networks:
      - forex-net
    ports:
      - "${EXECUTOR_HOST_PORT:-8080}:8080"
    depends_on:
      brain-python:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  backtest-engine-php:
    build:
      context: ./backtest-engine-php
      dockerfile: Dockerfile
    restart: "no"
    environment:
      BACKTEST_DATA_FILE: ${BACKTEST_DATA_FILE:-/app/data/eur_usd_1min_7days15-04_to_21-4.csv}
      BACKTEST_SYNTHETIC_BARS: ${BACKTEST_SYNTHETIC_BARS:-10000}
      STOP_LOSS_PIPS: ${STOP_LOSS_PIPS:-20}
      TAKE_PROFIT_PIPS: ${TAKE_PROFIT_PIPS:-40}
      MIN_CONFIDENCE: ${MIN_CONFIDENCE:-0.60}
      INITIAL_BALANCE: ${ACCOUNT_BALANCE:-10000}
      RISK_PERCENT: ${RISK_PERCENT:-1.0}
    volumes:
      - ./data:/app/data:ro
      - ./backtest-engine-php/results:/app/results
    networks:
      - forex-net
    depends_on:
      postgres:
        condition: service_healthy

  monitor-ui:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ./monitor-ui:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - forex-net
    ports:
      - "${MONITOR_HOST_PORT:-3000}:80"
    depends_on:
      brain-python:
        condition: service_healthy
      executor-java:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
