# executor-java/src/main/resources/application.properties
# ============================================================
# Lahraoui-NeuralForex-Pro – Executor Service Configuration
# ============================================================

spring.application.name=neuralforex-executor

# Server port
server.port=8080

# --- Brain service ---
brain.service.url=${BRAIN_SERVICE_URL:http://brain-python:8000}

# --- Heartbeat settings ---
heartbeat.interval_ms=5000
heartbeat.max_failures=3
heartbeat.timeout_seconds=3

# --- Trading loop ---
trading.poll_interval_ms=60000

# --- Risk management defaults ---
risk.account_balance=${ACCOUNT_BALANCE:10000.0}
risk.risk_percent=${RISK_PERCENT:1.0}
risk.stop_loss_pips=${STOP_LOSS_PIPS:20.0}
risk.reward_ratio=${REWARD_RATIO:2.0}

# --- PostgreSQL ---
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/neuralforex}
spring.datasource.username=${DB_USER:neuralforex}
spring.datasource.password=${DB_PASS:neuralforex_secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Logging ---
logging.level.com.neuralforex=INFO
logging.level.root=WARN
